<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Downloading…</title>
<style>
  body { font-family: system-ui, sans-serif; background:#f3f4f6; display:flex;
         align-items:center; justify-content:center; height:100vh; margin:0; }
  .box { background:#fff; padding:32px 40px; border-radius:10px; width:360px; text-align:center;
         box-shadow:0 6px 24px rgba(0,0,0,.1); }
  h2 { margin:0 0 6px; font-size:18px; }
  .file { color:#2563eb; font-weight:600; word-break:break-all; }
  .bar { height:8px; background:#e5e7eb; border-radius:6px; overflow:hidden; margin:22px 0 10px; }
  .fill { height:100%; width:0; background:#2563eb; animation: load 2.5s ease forwards; }
  @keyframes load { to { width:100%; } }
  .pct { color:#6b7280; font-size:13px; }
</style>
</head>
<body>
  <div class="box">
    <h2>Preparing your download…</h2>
    <div class="file" id="fname">file</div>
    <div class="bar"><div class="fill"></div></div>
    <div class="pct" id="pct">Connecting to file server…</div>
  </div>
  <!--
    This is a DECOY. There is no real file. The breach was already logged the
    instant the attacker hit /t/<token_id>. This page just keeps them looking
    busy while the owner gets alerted.
  -->
  <script>
    const name = new URLSearchParams(location.search).get('name') || 'document.xlsx';
    document.getElementById('fname').textContent = name;
    let p = 0;
    const pct = document.getElementById('pct');
    const t = setInterval(() => {
      p += Math.floor(Math.random()*12)+3;
      if (p >= 100) { p = 100; clearInterval(t); pct.textContent = 'Download failed. Please try again later.'; }
      else pct.textContent = 'Downloading… ' + p + '%';
    }, 250);
  </script>
</body>
</html>
